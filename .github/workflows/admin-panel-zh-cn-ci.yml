name: Admin Panel zh-CN CI

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/admin-panel-zh-cn-ci.yml'
      - 'deployment/production-patches/2026-07-11-admin-panel-zh-cn/SOURCE_TREE_SHA256'
      - 'deployment/production-patches/2026-07-11-admin-panel-zh-cn/source/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: admin-panel-zh-cn-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Full source verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_DIR: deployment/production-patches/2026-07-11-admin-panel-zh-cn
      SOURCE_DIR: deployment/production-patches/2026-07-11-admin-panel-zh-cn/source
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Verify pinned source
        run: "$RELEASE_DIR/scripts/verify-source.sh"

      - name: Install dependencies
        working-directory: ${{ env.SOURCE_DIR }}
        run: bun install --frozen-lockfile

      - name: Run complete quality gate
        working-directory: ${{ env.SOURCE_DIR }}
        run: |
          bun run locales:check
          bun run format:check:baseline
          bun run sort-imports:check:baseline
          bun run lint:strict
          bun run typecheck
          NODE_ENV=test SESSION_SECRET=ci-test-secret-do-not-use-in-production bun run test
          bun run build

      - name: Publish verified source tag
        run: |
          source_hash=$(cat "$RELEASE_DIR/SOURCE_TREE_SHA256")
          tag="admin-ci-${source_hash:0:12}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          remote_commit=$(git ls-remote --tags origin "refs/tags/$tag" | awk '{print $1}')
          if [[ -n "$remote_commit" ]]; then
            tagged_source_hash=$(git show "$remote_commit:$RELEASE_DIR/SOURCE_TREE_SHA256")
            test "$tagged_source_hash" = "$source_hash"
            echo "Verified tag already attests source tree $source_hash: $tag"
            exit 0
          fi
          git tag "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag"

      - name: Build amd64 release image on CI runner
        env:
          DOCKER_BUILDKIT: '1'
        run: |
          source_hash=$(cat "$RELEASE_DIR/SOURCE_TREE_SHA256")
          image_ref="librechat-admin-panel-zh-cn:${source_hash:0:12}"
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --build-arg "MODIFIED_SOURCE_REVISION=$source_hash" \
            --tag "$image_ref" \
            "$SOURCE_DIR"
          docker image inspect "$image_ref" \
            --format '{{.Architecture}} {{index .Config.Labels "org.opencontainers.image.revision"}}' \
            | grep -F "amd64 $source_hash"
          mkdir -p /tmp/admin-panel-image
          docker save "$image_ref" | gzip -1 > /tmp/admin-panel-image/admin-panel-image.tar.gz

      - name: Publish image as CI release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source_hash=$(cat "$RELEASE_DIR/SOURCE_TREE_SHA256")
          tag="admin-ci-${source_hash:0:12}"
          asset=/tmp/admin-panel-image/admin-panel-image.tar.gz
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" \
              --title "Admin Panel CI ${source_hash:0:12}" \
              --notes "CI-attested amd64 Admin Panel image for source tree ${source_hash}."
          gh release upload "$tag" "$asset" --clobber

      - name: Publish public GHCR image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source_hash=$(cat "$RELEASE_DIR/SOURCE_TREE_SHA256")
          local_image="librechat-admin-panel-zh-cn:${source_hash:0:12}"
          image_ref="ghcr.io/jetson998/librechat-admin-panel-zh-cn:${source_hash:0:12}"
          printf '%s' "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker tag "$local_image" "$image_ref"
          docker push "$image_ref"
          docker logout ghcr.io
          docker manifest inspect "$image_ref" >/dev/null
