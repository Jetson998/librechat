services:
  api:
    volumes:
      - /opt/librechat/ui-label-patch/client-dist:/app/client/dist:ro

  admin-panel:
    image: registry.librechat.ai/clickhouse/librechat-admin-panel@sha256:1d3916ae84439e83da83507afd4aae14a99bd81ff2e1890079f57d8d377eb8e9
    container_name: LibreChat-Admin-Panel
    depends_on:
      - api
    restart: always
    environment:
      - PORT=3000
      - SESSION_SECRET=${ADMIN_PANEL_SESSION_SECRET}
      - API_SERVER_URL=http://api:3080
      - VITE_API_BASE_URL=${DOMAIN_CLIENT:-https://152.32.172.162.sslip.io}
      - SESSION_COOKIE_SECURE=true

  client:
    depends_on:
      - api
      - admin-panel
