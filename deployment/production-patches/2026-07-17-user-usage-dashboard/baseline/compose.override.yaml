services:
  admin-panel:
    image: librechat-admin-panel-user-ui:e6a103c4218b
    container_name: LibreChat-Admin-Panel
    depends_on:
    - api
    restart: always
    environment:
    - PORT=3000
    - SESSION_SECRET=${ADMIN_PANEL_SESSION_SECRET}
    - API_SERVER_URL=http://api:3080
    - VITE_API_BASE_URL=${DOMAIN_CLIENT:-https://152.32.172.162.sslip.io}
    - SESSION_COOKIE_SECURE=true
  client:
    depends_on:
    - api
    - admin-panel
  api:
    volumes:
    - /opt/librechat/admin-user-creation/api-index.cjs:/app/packages/api/dist/index.cjs:ro
    - /opt/librechat/admin-user-creation/users.js:/app/api/server/routes/admin/users.js:ro
    - /opt/librechat/user-usage-dashboard/65ac5e4d0eb0-20260718135751/client-dist:/app/client/dist:ro
    - /opt/librechat/user-usage-dashboard/65ac5e4d0eb0-20260718135751/user.js:/app/api/server/routes/user.js:ro
    - /opt/librechat/user-usage-dashboard/65ac5e4d0eb0-20260718135751/usage-dashboard.js:/app/api/server/routes/usage-dashboard.js:ro
    environment:
    - USER_USAGE_CURRENCY=USD
    - USER_USAGE_USD_RATE=1
    - USER_USAGE_TIMEZONE=Asia/Singapore
